# PRODUCTION

services:
  app:
    build: .
    expose:
      - "8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: always
    user: "1000:1000"

  # FOR HTTPS
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - app
    restart: always

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U user -d mydb -h localhost -p 5432 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # db-init:
  #   build: .
  #   command: ["python", "-m", "src.db.db_init"]
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: "no"

  redis:
    image: redis:7
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
  caddy_data:
