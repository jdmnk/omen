services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      API_ENV: "${API_ENV}"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      POLYMARKET_PRIVATE_KEY: "${POLYMARKET_PRIVATE_KEY}"
      # Force watchfiles (used by Uvicorn reload) to poll for file changes
      # Needed for Docker bind mounts on macOS/WSL where inotify events don't propagate
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      db:
        condition: service_healthy
      # db-init:
      #   condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U user -d mydb -h localhost -p 5432 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # db-init:
  #   build: .
  #   command: ["python", "-m", "src.db.db_init"]
  #   environment:
  #     DATABASE_URL: "${DATABASE_URL}"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: "no"

  redis:
    image: redis:7
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
